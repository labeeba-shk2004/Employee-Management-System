<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <nav class="navbar">
        <a href="/" class="logo">
            <i class="fa-solid fa-building-user"></i> EMS
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
        <div class="nav-actions">
            <a href="/login.html" class="login-btn">Login</a>
            <a href="/signup.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <main class="login-main">
        <div class="signup-container">
            <div class="login-header">
                <i class="fa-solid fa-user-plus login-logo-icon"></i>
                <h2>Create your employee account</h2>
                <p>Already have an account? <a href="/login.html" class="highlight-link">Sign in here</a></p>
            </div>
            
            <form id="standaloneSignupForm" class="signup-form">
                <div class="form-row">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="firstname">First name</label>
                        <input type="text" id="firstname" required>
                    </div>
                    <div class="input-group">
                        <label for="lastname">Last name</label>
                        <input type="text" id="lastname" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="department">Department</label>
                        <select id="department" class="form-select">
                            <option value="">Select Department (Optional)</option>
                            <option value="hr">HR</option>
                            <option value="engineering">Engineering</option>
                            <option value="sales">Sales</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="salary">Salary</label>
                        <input type="number" id="salary">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="birthday">Birthday</label>
                        <input type="date" id="birthday">
                    </div>
                    <div class="input-group">
                        <label for="experience">Experience (Years)</label>
                        <input type="number" id="experience">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary full-width" style="margin-top: 1rem;">Sign Up</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
